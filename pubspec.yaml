name: ikigai_provider_app
description: Ikigai partner app for beauty service providers (salons, barbers, spa).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  dio: ^5.8.0+1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  geolocator: ^13.0.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  table_calendar: 3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
